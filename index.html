<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Tag MVP</title>
  <style>
    :root {
      --bg: #fafafa;
      --panel: #ffffff;
      --border: #d9d9d9;
      --text: #222;
      --muted: #666;
      --selected: #fff3a3;
      --tag-active-bg: #ffe47a;
      --tag-active-border: #d4b100;
      --shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 4px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
      line-height: 1.5;
    }

    input[type="text"] {
      min-width: 240px;
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }

    button,
    .file-label {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover,
    .file-label:hover {
      background: #f3f3f3;
    }

    input[type="file"] {
      display: none;
    }

    .stats {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .blocks {
      display: grid;
      gap: 12px;
    }

    .block {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .block.selected {
      background: var(--selected);
      border-color: #d4b100;
    }

    .block-head {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .block-content {
      white-space: pre-wrap;
      line-height: 1.55;
      word-break: break-word;
    }

    .toolbar {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed rgba(0,0,0,0.15);
      gap: 10px;
      flex-direction: column;
      align-items: stretch;
    }

    .block.selected .toolbar {
      display: flex;
    }

    .toolbar .label {
      color: var(--muted);
      font-size: 13px;
    }

    .tag-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tag-btn.active {
      background: var(--tag-active-bg);
      border-color: var(--tag-active-border);
    }

    .tag-manage-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tag-input {
      min-width: 160px;
      flex: 1;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar panel">
      <div>
        <h1>Block Tag MVP</h1>
        <p class="hint">当前版本支持：打开 JSON、搜索、单击选中、高亮、多 tag 管理、新建 tag、删除 tag（二次确认）、自动缓存、恢复缓存、缓存页面位置、导出 JSON / 文本。</p>
      </div>

      <div class="row">
        <label class="file-label" for="fileInput">打开 JSON</label>
        <input id="fileInput" type="file" accept="application/json,.json" />

        <button id="loadDemoBtn" type="button">载入示例数据</button>
        <button id="exportJsonBtn" type="button">导出 JSON</button>
        <button id="exportTextBtn" type="button">导出文本</button>
        <button id="clearCacheBtn" type="button">清除缓存</button>
      </div>

      <div class="row">
        <input id="searchInput" type="text" placeholder="搜索关键词或 tag" />
      </div>

      <div class="stats" id="stats"></div>
    </div>

    <div class="blocks" id="blocks"></div>
  </div>

  <script>
    // ===== 基础状态 =====
    const ALLOWED_KEYS = ["id", "original_content", "content", "tags", "source", "meta"];
    const CACHE_KEY = "block_tagger_cache_v2";
    const CACHE_META_KEY = "block_tagger_meta_v2";
    const DEFAULT_TAGS = ["灵感"];

    const demoData = [
      {
        id: "1",
        original_content: "今天想到一个生态缸结构\n我要往里面放些端足目",
        content: "今天想到一个生态缸结构\n我要往里面放些端足目",
        tags: [],
        source: "manual",
        meta: {}
      },
      {
        id: "2",
        original_content: "filehelper: 这个思路可以扩展成系统设计",
        content: "filehelper: 这个思路可以扩展成系统设计",
        tags: ["灵感"],
        source: "wechat",
        meta: {}
      },
      {
        id: "3",
        original_content: "tag 不该直接写进正文，应该在导出层再拼接",
        content: "tag 不该直接写进正文，应该在导出层再拼接",
        tags: [],
        source: "note",
        meta: {}
      }
    ];

    let blocks = [];
    let selectedId = null;
    let lastSavedAt = null;
    let saveTimer = null;
    let scrollTimer = null;
    let allTags = [...DEFAULT_TAGS];

    const fileInput = document.getElementById("fileInput");
    const loadDemoBtn = document.getElementById("loadDemoBtn");
    const exportJsonBtn = document.getElementById("exportJsonBtn");
    const exportTextBtn = document.getElementById("exportTextBtn");
    const clearCacheBtn = document.getElementById("clearCacheBtn");
    const searchInput = document.getElementById("searchInput");
    const blocksEl = document.getElementById("blocks");
    const statsEl = document.getElementById("stats");

    // ===== 数据处理 =====
    function normalizeBlock(input, index) {
      const output = {};
      for (const key of ALLOWED_KEYS) {
        if (Object.prototype.hasOwnProperty.call(input, key)) {
          output[key] = input[key];
        }
      }

      if (typeof output.id !== "string" || !output.id.trim()) {
        output.id = String(index + 1);
      }

      if (typeof output.original_content !== "string") {
        output.original_content = typeof input.content === "string" ? input.content : "";
      }

      if (typeof output.content !== "string") {
        output.content = output.original_content;
      }

      if (!Array.isArray(output.tags)) {
        output.tags = [];
      }

      output.tags = output.tags
        .filter((tag) => typeof tag === "string")
        .map((tag) => tag.trim())
        .filter(Boolean);

      if (typeof output.source !== "string") {
        output.source = "unknown";
      }

      if (typeof output.meta !== "object" || output.meta === null || Array.isArray(output.meta)) {
        output.meta = {};
      }

      return output;
    }

    function refreshAllTags() {
      const fromBlocks = new Set(DEFAULT_TAGS);
      for (const block of blocks) {
        for (const tag of block.tags) {
          fromBlocks.add(tag);
        }
      }
      allTags = Array.from(fromBlocks);
    }

    function loadBlocks(raw) {
      if (!Array.isArray(raw)) {
        throw new Error("JSON 顶层必须是数组。\n例如：[ { ... }, { ... } ]");
      }
      blocks = raw.map(normalizeBlock);
      selectedId = null;
      refreshAllTags();
      scheduleSaveCache();
      render();
    }

    function getSelectedBlock() {
      return blocks.find((block) => block.id === selectedId) || null;
    }

    function toggleTagForBlock(blockId, tagName) {
      const target = blocks.find((block) => block.id === blockId);
      if (!target) return;
      if (!Array.isArray(target.tags)) target.tags = [];

      if (target.tags.includes(tagName)) {
        target.tags = target.tags.filter((tag) => tag !== tagName);
      } else {
        target.tags.push(tagName);
      }

      refreshAllTags();
      scheduleSaveCache();
      render();
    }

    function addNewTag(tagName) {
      const normalized = String(tagName || "").trim();
      if (!normalized) return false;
      if (!allTags.includes(normalized)) {
        allTags.push(normalized);
      }
      scheduleSaveCache();
      render();
      return true;
    }

    function deleteTag(tagName) {
      if (!tagName) return;
      const confirmed = window.confirm(
        `确认删除 tag「${tagName}」吗？\n\n删除后，它会从 tag 列表中消失，并从所有 block 中一并移除。`
      );
      if (!confirmed) return;

      for (const block of blocks) {
        block.tags = block.tags.filter((tag) => tag !== tagName);
      }

      refreshAllTags();
      scheduleSaveCache();
      render();
    }

    // ===== 缓存 =====
    function saveCache() {
      try {
        const meta = {
          selectedId,
          searchText: searchInput.value,
          lastSavedAt: new Date().toISOString(),
          scrollY: window.scrollY,
          allTags
        };

        localStorage.setItem(CACHE_KEY, JSON.stringify(blocks));
        localStorage.setItem(CACHE_META_KEY, JSON.stringify(meta));
        lastSavedAt = meta.lastSavedAt;
        renderStatsOnly();
      } catch (error) {
        console.error("保存缓存失败", error);
      }
    }

    function scheduleSaveCache() {
      window.clearTimeout(saveTimer);
      saveTimer = window.setTimeout(saveCache, 300);
    }

    function scheduleScrollSave() {
      window.clearTimeout(scrollTimer);
      scrollTimer = window.setTimeout(saveCache, 200);
    }

    function loadCache() {
      try {
        const rawBlocks = localStorage.getItem(CACHE_KEY);
        const rawMeta = localStorage.getItem(CACHE_META_KEY);
        if (!rawBlocks) return false;

        const parsedBlocks = JSON.parse(rawBlocks);
        const parsedMeta = rawMeta ? JSON.parse(rawMeta) : {};

        if (!Array.isArray(parsedBlocks)) return false;

        blocks = parsedBlocks.map(normalizeBlock);
        selectedId = typeof parsedMeta.selectedId === "string" ? parsedMeta.selectedId : null;
        searchInput.value = typeof parsedMeta.searchText === "string" ? parsedMeta.searchText : "";
        lastSavedAt = typeof parsedMeta.lastSavedAt === "string" ? parsedMeta.lastSavedAt : null;

        if (Array.isArray(parsedMeta.allTags)) {
          allTags = Array.from(new Set([...DEFAULT_TAGS, ...parsedMeta.allTags.filter((tag) => typeof tag === "string" && tag.trim())]));
        } else {
          refreshAllTags();
        }

        requestAnimationFrame(() => {
          if (typeof parsedMeta.scrollY === "number") {
            window.scrollTo({ top: parsedMeta.scrollY, behavior: "auto" });
          }
        });

        return true;
      } catch (error) {
        console.error("读取缓存失败", error);
        return false;
      }
    }

    function clearCache() {
      const confirmed = window.confirm(
        "确认清除本地缓存吗？\n\n清除后，本地自动保存的工作状态会消失。\n已导出的 JSON 文件不受影响。\n未导出的修改可能无法恢复。"
      );

      if (!confirmed) return;

      localStorage.removeItem(CACHE_KEY);
      localStorage.removeItem(CACHE_META_KEY);
      lastSavedAt = null;
      allTags = [...DEFAULT_TAGS];
      loadBlocks(demoData);
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    // ===== 渲染 =====
    function getFilteredBlocks() {
      const keyword = searchInput.value.trim().toLowerCase();
      if (!keyword) return blocks;

      return blocks.filter((block) => {
        const text = (block.content || "").toLowerCase();
        const tags = (block.tags || []).join(" ").toLowerCase();
        const source = (block.source || "").toLowerCase();
        return text.includes(keyword) || tags.includes(keyword) || source.includes(keyword);
      });
    }

    function formatTime(isoString) {
      if (!isoString) return "尚未缓存";
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return "尚未缓存";
      return date.toLocaleString();
    }

    function renderStatsOnly() {
      const filtered = getFilteredBlocks();
      statsEl.textContent = `当前 ${blocks.length} 个块，显示 ${filtered.length} 个。tag 数量：${allTags.length}。本地缓存：已启用。上次自动保存：${formatTime(lastSavedAt)}。`;
    }

    function buildTagManageRow(block) {
      const manageRow = document.createElement("div");
      manageRow.className = "tag-manage-row";

      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "新建 tag";
      input.className = "tag-input";

      const addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.textContent = "新建 tag";
      addBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        const ok = addNewTag(input.value);
        if (ok) {
          input.value = "";
        }
      });

      input.addEventListener("keydown", (event) => {
        event.stopPropagation();
        if (event.key === "Enter") {
          event.preventDefault();
          const ok = addNewTag(input.value);
          if (ok) {
            input.value = "";
          }
        }
      });

      const deleteLabel = document.createElement("span");
      deleteLabel.className = "label";
      deleteLabel.textContent = "删除 tag：";

      manageRow.append(input, addBtn, deleteLabel);

      for (const tag of allTags) {
        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.textContent = `删 ${tag}`;
        deleteBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          deleteTag(tag);
        });
        manageRow.appendChild(deleteBtn);
      }

      return manageRow;
    }

    function render() {
      const filtered = getFilteredBlocks();
      blocksEl.innerHTML = "";
      renderStatsOnly();

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "panel empty";
        empty.textContent = "没有匹配的块。";
        blocksEl.appendChild(empty);
        return;
      }

      for (const block of filtered) {
        const item = document.createElement("div");
        item.className = "block" + (block.id === selectedId ? " selected" : "");
        item.dataset.id = block.id;

        const head = document.createElement("div");
        head.className = "block-head";
        const tagText = Array.isArray(block.tags) && block.tags.length ? block.tags.join(", ") : "";
        head.textContent = `[${tagText}] id=${block.id} source=${block.source}`;

        const content = document.createElement("div");
        content.className = "block-content";
        content.textContent = block.content;

        const toolbar = document.createElement("div");
        toolbar.className = "toolbar";

        const label = document.createElement("span");
        label.className = "label";
        label.textContent = "点击 tag 可切换；已有 tag 会高亮：";

        const tagPanel = document.createElement("div");
        tagPanel.className = "tag-panel";

        for (const tag of allTags) {
          const tagBtn = document.createElement("button");
          tagBtn.type = "button";
          tagBtn.className = "tag-btn" + (block.tags.includes(tag) ? " active" : "");
          tagBtn.textContent = tag;
          tagBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            toggleTagForBlock(block.id, tag);
          });
          tagPanel.appendChild(tagBtn);
        }

        const manageRow = buildTagManageRow(block);

        toolbar.append(label, tagPanel, manageRow);
        item.append(head, content, toolbar);

        item.addEventListener("click", () => {
          if (selectedId === block.id) {
            return;
          }
          selectedId = block.id;
          scheduleSaveCache();
          render();
        });

        blocksEl.appendChild(item);
      }
    }

    // ===== 导入导出 =====
    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportJson() {
      downloadFile(
        "blocks_tagged.json",
        JSON.stringify(blocks, null, 2),
        "application/json;charset=utf-8"
      );
    }

    function exportText() {
      const text = blocks.map((block) => {
        const tagText = Array.isArray(block.tags) && block.tags.length ? block.tags.join(", ") : "";
        return `[${tagText}]${block.content}`;
      }).join("\n\n--------------------\n\n");

      downloadFile("blocks_tagged.txt", text, "text/plain;charset=utf-8");
    }

    // ===== 事件绑定 =====
    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        loadBlocks(parsed);
      } catch (error) {
        alert("打开 JSON 失败：\n" + error.message);
      }
    });

    loadDemoBtn.addEventListener("click", () => loadBlocks(demoData));
    exportJsonBtn.addEventListener("click", exportJson);
    exportTextBtn.addEventListener("click", exportText);
    clearCacheBtn.addEventListener("click", clearCache);
    searchInput.addEventListener("input", () => {
      scheduleSaveCache();
      render();
    });

    window.addEventListener("scroll", scheduleScrollSave, { passive: true });

    document.addEventListener("click", (event) => {
      const clickedBlock = event.target.closest(".block");
      if (!clickedBlock && selectedId !== null) {
        selectedId = null;
        scheduleSaveCache();
        render();
      }
    });

    // ===== 启动 =====
    const restored = loadCache();
    if (!restored) {
      blocks = demoData.map(normalizeBlock);
      refreshAllTags();
    }
    render();
  </script>
</body>
</html>
