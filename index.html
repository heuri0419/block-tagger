<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Tag MVP</title>
  <style>
    :root {
      --bg: #fafafa;
      --panel: #ffffff;
      --border: #d9d9d9;
      --text: #222;
      --muted: #666;
      --selected: #fff3a3;
      --tag-active-bg: #ffe47a;
      --tag-active-border: #d4b100;
      --shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 4px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
      line-height: 1.5;
    }

    input[type="text"] {
      min-width: 240px;
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      background: #fff;
    }

    button,
    .file-label {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover,
    .file-label:hover {
      background: #f3f3f3;
    }

    input[type="file"] {
      display: none;
    }

    .stats {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .blocks {
      display: grid;
      gap: 12px;
    }

    .block {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .block.selected {
      background: var(--selected);
      border-color: #d4b100;
    }

    .block-head {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .block-content {
      white-space: pre-wrap;
      line-height: 1.55;
      word-break: break-word;
    }

    .toolbar,
    .tag-manager {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed rgba(0,0,0,0.15);
      gap: 10px;
      flex-direction: column;
      align-items: stretch;
    }

    .block.selected .toolbar,
    .tag-manager.open {
      display: flex;
    }

    .toolbar .label,
    .tag-manager .label {
      color: var(--muted);
      font-size: 13px;
    }

    .tag-panel,
    .tag-manager-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tag-btn.active {
      background: var(--tag-active-bg);
      border-color: var(--tag-active-border);
    }

    .tag-add-row,
    .tag-manager-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tag-input,
    .tag-search-input {
      min-width: 160px;
      flex: 1;
    }

    .tag-create-toggle {
      min-width: 44px;
      text-align: center;
      font-weight: 600;
    }

    .tag-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 8px;
      background: #fff;
    }

    .tag-name {
      font-size: 16px;
    }

    .tag-delete {
      padding: 4px 8px;
      font-size: 12px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar panel">
      <div>
        <h1>Block Tag MVP</h1>
        <p class="hint">当前版本支持：打开 JSON、搜索、单击选中、高亮、多 tag 管理、新建 tag、删除 tag（二次确认）、自动缓存、恢复缓存、缓存页面位置、导出 JSON / 文本。</p>
      </div>

      <div class="row">
        <label class="file-label" for="fileInput">打开 JSON</label>
        <input id="fileInput" type="file" accept="application/json,.json" />
        <button id="exportJsonBtn" type="button">导出 JSON</button>
        <button id="exportTextBtn" type="button">导出文本</button>
        <button id="manageTagsBtn" type="button">管理 tag</button>
        <button id="clearCacheBtn" type="button">清除缓存</button>
      </div>

      <div class="row">
        <input id="searchInput" type="text" placeholder="搜索关键词或 tag" />
      </div>

      <div class="stats" id="stats"></div>

      <div class="tag-manager" id="tagManager">
        <div class="label">管理 tag</div>
        <div class="tag-manager-row">
          <input id="tagSearchInput" class="tag-search-input" type="text" placeholder="搜索 tag" />
        </div>
        <div class="tag-manager-row" id="tagManagerCreateRow">
          <button id="managerCreateToggleBtn" class="tag-create-toggle" type="button">＋</button>
        </div>
        <div class="tag-manager-panel" id="tagManagerPanel"></div>
      </div>
    </div>

    <div class="blocks" id="blocks"></div>
  </div>

  <script>
    // ===== 基础状态 =====
    const ALLOWED_KEYS = ["id", "original_content", "content", "tags", "source", "meta"];
    const CACHE_DATA_KEY = "block_tagger_data_v3";
    const CACHE_VIEW_KEY = "block_tagger_view_v3";
    const DEFAULT_TAGS = ["灵感"];

    const demoData = [
      {
        id: "1",
        original_content: "今天想到一个生态缸结构\n我要往里面放些端足目",
        content: "今天想到一个生态缸结构\n我要往里面放些端足目",
        tags: [],
        source: "manual",
        meta: {}
      },
      {
        id: "2",
        original_content: "filehelper: 这个思路可以扩展成系统设计",
        content: "filehelper: 这个思路可以扩展成系统设计",
        tags: ["灵感"],
        source: "wechat",
        meta: {}
      },
      {
        id: "3",
        original_content: "tag 不该直接写进正文，应该在导出层再拼接",
        content: "tag 不该直接写进正文，应该在导出层再拼接",
        tags: [],
        source: "note",
        meta: {}
      }
    ];

    let blocks = [];
    let selectedId = null;
    let mainSelectedId = null;
    let searchSelectedId = null;
    let lastDataSavedAt = null;
    let dataSaveTimer = null;
    let viewSaveTimer = null;
    let allTags = [];
    let tagManagerOpen = false;
    let inlineCreateOpenForBlockId = null;
    let managerCreateOpen = false;
    let lastSearchMode = false;
    let normalScrollY = 0;
    let searchScrollY = 0;

    const fileInput = document.getElementById("fileInput");
    const exportJsonBtn = document.getElementById("exportJsonBtn");
    const exportTextBtn = document.getElementById("exportTextBtn");
    const manageTagsBtn = document.getElementById("manageTagsBtn");
    const clearCacheBtn = document.getElementById("clearCacheBtn");
    const searchInput = document.getElementById("searchInput");
    const tagSearchInput = document.getElementById("tagSearchInput");
    const tagManager = document.getElementById("tagManager");
    const tagManagerPanel = document.getElementById("tagManagerPanel");
    const tagManagerCreateRow = document.getElementById("tagManagerCreateRow");
    const managerCreateToggleBtn = document.getElementById("managerCreateToggleBtn");
    const blocksEl = document.getElementById("blocks");
    const statsEl = document.getElementById("stats");

    // ===== 数据处理 =====
    function normalizeBlock(input, index) {
      const output = {};
      for (const key of ALLOWED_KEYS) {
        if (Object.prototype.hasOwnProperty.call(input, key)) {
          output[key] = input[key];
        }
      }

      if (typeof output.id !== "string" || !output.id.trim()) {
        output.id = String(index + 1);
      }

      if (typeof output.original_content !== "string") {
        output.original_content = typeof input.content === "string" ? input.content : "";
      }

      if (typeof output.content !== "string") {
        output.content = output.original_content;
      }

      if (!Array.isArray(output.tags)) {
        output.tags = [];
      }

      output.tags = output.tags
        .filter((tag) => typeof tag === "string")
        .map((tag) => tag.trim())
        .filter(Boolean);

      if (typeof output.source !== "string") {
        output.source = "unknown";
      }

      if (typeof output.meta !== "object" || output.meta === null || Array.isArray(output.meta)) {
        output.meta = {};
      }

      return output;
    }

    function deriveTagsFromBlocks(sourceBlocks) {
      const set = new Set();
      for (const block of sourceBlocks) {
        for (const tag of block.tags || []) {
          if (typeof tag === "string" && tag.trim()) {
            set.add(tag.trim());
          }
        }
      }
      return Array.from(set);
    }

    function ensureTagListNotEmpty() {
      if (allTags.length === 0) {
        allTags = [...DEFAULT_TAGS];
      }
    }

    function loadBlocks(raw) {
      if (!Array.isArray(raw)) {
        throw new Error("JSON 顶层必须是数组。\n例如：[ { ... }, { ... } ]");
      }
      blocks = raw.map(normalizeBlock);
      selectedId = null;
      inlineCreateOpenForBlockId = null;
      const importedTags = deriveTagsFromBlocks(blocks);
      allTags = importedTags.length > 0 ? importedTags : [...DEFAULT_TAGS];
      scheduleDataSave();
      scheduleViewSave();
      render();
    }

    function toggleTagForBlock(blockId, tagName) {
      const target = blocks.find((block) => block.id === blockId);
      if (!target) return;
      if (!Array.isArray(target.tags)) target.tags = [];

      if (target.tags.includes(tagName)) {
        target.tags = target.tags.filter((tag) => tag !== tagName);
      } else {
        target.tags.push(tagName);
      }

      scheduleDataSave();
      render();
    }

    function addNewTag(tagName) {
      const normalized = String(tagName || "").trim();
      if (!normalized) return false;
      if (!allTags.includes(normalized)) {
        allTags.push(normalized);
      }
      scheduleDataSave();
      render();
      return true;
    }

    function deleteTag(tagName) {
      if (!tagName) return;
      const confirmed = window.confirm(
        `确认删除 tag「${tagName}」吗？\n\n删除后，它会从 tag 列表中消失，并从所有 block 中一并移除。`
      );
      if (!confirmed) return;

      for (const block of blocks) {
        block.tags = block.tags.filter((tag) => tag !== tagName);
      }

      allTags = allTags.filter((tag) => tag !== tagName);
      ensureTagListNotEmpty();
      scheduleDataSave();
      render();
    }

    // ===== 缓存：数据层 =====
    function saveDataCache() {
      try {
        const payload = {
          blocks,
          allTags,
          lastDataSavedAt: new Date().toISOString()
        };

        localStorage.setItem(CACHE_DATA_KEY, JSON.stringify(payload));
        lastDataSavedAt = payload.lastDataSavedAt;
        renderStatsOnly();
      } catch (error) {
        console.error("保存数据缓存失败", error);
      }
    }

    function scheduleDataSave() {
      window.clearTimeout(dataSaveTimer);
      dataSaveTimer = window.setTimeout(saveDataCache, 300);
    }

    function loadDataCache() {
      try {
        const raw = localStorage.getItem(CACHE_DATA_KEY);
        if (!raw) return false;

        const payload = JSON.parse(raw);
        if (!payload || !Array.isArray(payload.blocks)) return false;

        blocks = payload.blocks.map(normalizeBlock);
        allTags = Array.isArray(payload.allTags)
          ? payload.allTags.filter((tag) => typeof tag === "string" && tag.trim()).map((tag) => tag.trim())
          : deriveTagsFromBlocks(blocks);
        ensureTagListNotEmpty();
        lastDataSavedAt = typeof payload.lastDataSavedAt === "string" ? payload.lastDataSavedAt : null;
        return true;
      } catch (error) {
        console.error("读取数据缓存失败", error);
        return false;
      }
    }

    // ===== 缓存：界面层 =====
    function saveViewState() {
      try {
        const payload = {
          selectedId,
          mainSelectedId,
          searchSelectedId,
          searchText: searchInput.value,
          tagSearchText: tagSearchInput.value,
          scrollY: window.scrollY,
          normalScrollY,
          searchScrollY,
          inlineCreateOpenForBlockId
        };
        localStorage.setItem(CACHE_VIEW_KEY, JSON.stringify(payload));
      } catch (error) {
        console.error("保存界面缓存失败", error);
      }
    }

    function scheduleViewSave() {
      window.clearTimeout(viewSaveTimer);
      viewSaveTimer = window.setTimeout(saveViewState, 200);
    }

    function loadViewState() {
      try {
        const raw = localStorage.getItem(CACHE_VIEW_KEY);
        if (!raw) return;
        const payload = JSON.parse(raw);
        selectedId = typeof payload.selectedId === "string" ? payload.selectedId : null;
        mainSelectedId = typeof payload.mainSelectedId === "string" ? payload.mainSelectedId : null;
        searchSelectedId = typeof payload.searchSelectedId === "string" ? payload.searchSelectedId : null;
        searchInput.value = typeof payload.searchText === "string" ? payload.searchText : "";
        tagSearchInput.value = typeof payload.tagSearchText === "string" ? payload.tagSearchText : "";
        inlineCreateOpenForBlockId = typeof payload.inlineCreateOpenForBlockId === "string" ? payload.inlineCreateOpenForBlockId : null;
        normalScrollY = typeof payload.normalScrollY === "number" ? payload.normalScrollY : 0;
        searchScrollY = typeof payload.searchScrollY === "number" ? payload.searchScrollY : 0;
        lastSearchMode = searchInput.value.trim().length > 0;

        requestAnimationFrame(() => {
          scrollToSelectedOrFallback();
        });
      } catch (error) {
        console.error("读取界面缓存失败", error);
      }
    }

    function clearCache() {
      const confirmed = window.confirm(
        "确认清除本地缓存吗？\n\n清除后，本地自动保存的工作状态会消失。\n已导出的 JSON 文件不受影响。\n未导出的修改可能无法恢复。"
      );

      if (!confirmed) return;

      localStorage.removeItem(CACHE_DATA_KEY);
      localStorage.removeItem(CACHE_VIEW_KEY);
      lastDataSavedAt = null;
      allTags = [...DEFAULT_TAGS];
      inlineCreateOpenForBlockId = null;
      lastSearchMode = false;
      normalScrollY = 0;
      searchScrollY = 0;
      loadBlocks(demoData);
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    // ===== 渲染 =====
    function getFilteredBlocks() {
      const keyword = searchInput.value.trim().toLowerCase();
      if (!keyword) return blocks;

      return blocks.filter((block) => {
        const text = (block.content || "").toLowerCase();
        const tags = (block.tags || []).join(" ").toLowerCase();
        const source = (block.source || "").toLowerCase();
        return text.includes(keyword) || tags.includes(keyword) || source.includes(keyword);
      });
    }

    function getFilteredTagList() {
      const keyword = tagSearchInput.value.trim().toLowerCase();
      if (!keyword) return allTags;
      return allTags.filter((tag) => tag.toLowerCase().includes(keyword));
    }

    function formatTime(isoString) {
      if (!isoString) return "尚未保存数据";
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return "尚未保存数据";
      return date.toLocaleString();
    }

    function isSearchMode() {
      return searchInput.value.trim().length > 0;
    }

    function updateScrollBucketFromCurrentState() {
      if (isSearchMode()) {
        searchScrollY = window.scrollY;
      } else {
        normalScrollY = window.scrollY;
      }
    }

    function handleSearchModeTransition() {
      const currentSearchMode = isSearchMode();
      if (currentSearchMode === lastSearchMode) return;

      updateScrollBucketFromCurrentState();

      if (currentSearchMode) {
        selectedId = searchSelectedId ?? mainSelectedId;
      } else {
        selectedId = mainSelectedId;
        searchSelectedId = null;
      }

      lastSearchMode = currentSearchMode;

      requestAnimationFrame(() => {
        scrollToSelectedOrFallback();
        updateScrollBucketFromCurrentState();
        scheduleViewSave();
      });
    }

    function scrollToSelectedOrFallback() {
      const targetId = selectedId;
      if (targetId) {
        const el = document.querySelector(`.block[data-id="${targetId}"]`);
        if (el) {
          el.scrollIntoView({ block: "center", behavior: "auto" });
          return;
        }
      }

      const targetScrollY = isSearchMode() ? searchScrollY : normalScrollY;
      window.scrollTo({ top: targetScrollY, behavior: "auto" });
    }

    function renderStatsOnly() {
      const filtered = getFilteredBlocks();
      statsEl.textContent = `当前 ${blocks.length} 个块，显示 ${filtered.length} 个。tag 数量：${allTags.length}。数据上次自动保存：${formatTime(lastDataSavedAt)}。`;
    }

    function buildInlineCreateRow(blockId) {
      const row = document.createElement("div");
      row.className = "tag-add-row";

      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "新建 tag";
      input.className = "tag-input";

      const addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.textContent = "确认新建";
      addBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        const ok = addNewTag(input.value);
        if (ok) {
          inlineCreateOpenForBlockId = null;
          scheduleViewSave();
          render();
        }
      });

      input.addEventListener("keydown", (event) => {
        event.stopPropagation();
        if (event.key === "Enter") {
          event.preventDefault();
          const ok = addNewTag(input.value);
          if (ok) {
            inlineCreateOpenForBlockId = null;
            scheduleViewSave();
            render();
          }
        }
      });

      row.append(input, addBtn);
      return row;
    }

    function renderTagManager() {
      tagManager.classList.toggle("open", tagManagerOpen);
      tagManagerPanel.innerHTML = "";
      tagManagerCreateRow.querySelectorAll("input, .tag-input-confirm").forEach((node) => node.remove());

      if (!tagManagerOpen) return;

      const tags = getFilteredTagList();

      if (managerCreateOpen) {
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "新建 tag";
        input.className = "tag-input";

        const confirmBtn = document.createElement("button");
        confirmBtn.type = "button";
        confirmBtn.className = "tag-input-confirm";
        confirmBtn.textContent = "确认新建";

        const submit = () => {
          const ok = addNewTag(input.value);
          if (ok) {
            managerCreateOpen = false;
            scheduleViewSave();
            render();
          }
        };

        confirmBtn.addEventListener("click", submit);
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            submit();
          }
        });

        tagManagerCreateRow.append(input, confirmBtn);
      }

      for (const tag of tags) {
        const item = document.createElement("div");
        item.className = "tag-item";

        const name = document.createElement("span");
        name.className = "tag-name";
        name.textContent = tag;

        const del = document.createElement("button");
        del.type = "button";
        del.className = "tag-delete";
        del.textContent = "删除";
        del.addEventListener("click", (event) => {
          event.stopPropagation();
          deleteTag(tag);
        });

        item.append(name, del);
        tagManagerPanel.appendChild(item);
      }
    }

    function render() {
      const filtered = getFilteredBlocks();
      blocksEl.innerHTML = "";
      renderStatsOnly();
      renderTagManager();

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "panel empty";
        empty.textContent = "没有匹配的块。";
        blocksEl.appendChild(empty);
        return;
      }

      for (const block of filtered) {
        const item = document.createElement("div");
        item.className = "block" + (block.id === selectedId ? " selected" : "");
        item.dataset.id = block.id;

        const head = document.createElement("div");
        head.className = "block-head";
        const tagText = Array.isArray(block.tags) && block.tags.length ? block.tags.join(", ") : "";
        head.textContent = `[${tagText}] id=${block.id} source=${block.source}`;

        const content = document.createElement("div");
        content.className = "block-content";
        content.textContent = block.content;

        const toolbar = document.createElement("div");
        toolbar.className = "toolbar";

        const label = document.createElement("span");
        label.className = "label";
        label.textContent = "点击 tag 可切换；已有 tag 会高亮：";

        const tagPanel = document.createElement("div");
        tagPanel.className = "tag-panel";

        for (const tag of allTags) {
          const tagBtn = document.createElement("button");
          tagBtn.type = "button";
          tagBtn.className = "tag-btn" + (block.tags.includes(tag) ? " active" : "");
          tagBtn.textContent = tag;
          tagBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            toggleTagForBlock(block.id, tag);
          });
          tagPanel.appendChild(tagBtn);
        }

        const createToggleBtn = document.createElement("button");
        createToggleBtn.type = "button";
        createToggleBtn.className = "tag-create-toggle";
        createToggleBtn.textContent = "＋";
        createToggleBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          inlineCreateOpenForBlockId = inlineCreateOpenForBlockId === block.id ? null : block.id;
          scheduleViewSave();
          render();
        });
        tagPanel.appendChild(createToggleBtn);

        toolbar.append(label, tagPanel);

        if (inlineCreateOpenForBlockId === block.id) {
          toolbar.appendChild(buildInlineCreateRow(block.id));
        }

        item.append(head, content, toolbar);

        item.addEventListener("click", () => {
          const inSearch = isSearchMode();

          if (selectedId === block.id) {
            selectedId = null;
            inlineCreateOpenForBlockId = null;
            if (inSearch) {
              searchSelectedId = null;
            } else {
              mainSelectedId = null;
            }
          } else {
            selectedId = block.id;
            if (inSearch) {
              searchSelectedId = block.id;
            } else {
              mainSelectedId = block.id;
            }
          }
          scheduleViewSave();
          render();
        });

        blocksEl.appendChild(item);
      }
    }

    // ===== 导入导出 =====
    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportJson() {
      downloadFile(
        "blocks_tagged.json",
        JSON.stringify(blocks, null, 2),
        "application/json;charset=utf-8"
      );
    }

    function exportText() {
      const text = blocks.map((block) => {
        const tagText = Array.isArray(block.tags) && block.tags.length ? block.tags.join(", ") : "";
        return `[${tagText}]${block.content}`;
      }).join("\n\n--------------------\n\n");

      downloadFile("blocks_tagged.txt", text, "text/plain;charset=utf-8");
    }

    // ===== 事件绑定 =====
    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        loadBlocks(parsed);
      } catch (error) {
        alert("打开 JSON 失败：\n" + error.message);
      }
    });
    exportJsonBtn.addEventListener("click", exportJson);
    exportTextBtn.addEventListener("click", exportText);
    clearCacheBtn.addEventListener("click", clearCache);

    manageTagsBtn.addEventListener("click", () => {
      tagManagerOpen = !tagManagerOpen;
      scheduleViewSave();
      render();
    });

    managerCreateToggleBtn.addEventListener("click", () => {
      managerCreateOpen = !managerCreateOpen;
      scheduleViewSave();
      render();
    });

    searchInput.addEventListener("input", () => {
      handleSearchModeTransition();
      scheduleViewSave();
      render();
    });

    tagSearchInput.addEventListener("input", () => {
      scheduleViewSave();
      render();
    });

    window.addEventListener("scroll", () => {
      updateScrollBucketFromCurrentState();
      scheduleViewSave();
    }, { passive: true });

    window.addEventListener("pagehide", () => {
      updateScrollBucketFromCurrentState();
      saveViewState();
      if (dataSaveTimer) {
        window.clearTimeout(dataSaveTimer);
        saveDataCache();
      }
    });

    document.addEventListener("click", (event) => {
      const clickedBlock = event.target.closest(".block");
      const clickedTagManager = event.target.closest("#tagManager");
      const clickedManageBtn = event.target.closest("#manageTagsBtn");
      const clickedTopbar = event.target.closest(".topbar");
      if (!clickedBlock && !clickedTagManager && !clickedManageBtn && !clickedTopbar && selectedId !== null) {
        selectedId = null;
        inlineCreateOpenForBlockId = null;
        scheduleViewSave();
        render();
      }
    });

    // ===== 启动 =====
    const restoredData = loadDataCache();
    if (!restoredData) {
      blocks = demoData.map(normalizeBlock);
      allTags = [...DEFAULT_TAGS];
    }
    loadViewState();
    lastSearchMode = isSearchMode();
    render();
  </script>
</body>
</html>
