<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Tag MVP</title>
  <style>
    :root {
      --bg: #fafafa;
      --panel: #ffffff;
      --border: #d9d9d9;
      --text: #222;
      --muted: #666;
      --selected: #fff3a3;
      --tag-active-bg: #ffe47a;
      --tag-active-border: #d4b100;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      --menu-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 4px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
      line-height: 1.5;
    }

    input[type="text"],
    textarea {
      min-width: 160px;
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      font-family: inherit;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      max-height: 50vh;
      resize: none;
      overflow-y: auto;
      line-height: 1.55;
    }

    button,
    .file-label {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover,
    .file-label:hover {
      background: #f3f3f3;
    }

    .save-btn {
      min-width: 44px;
      padding: 8px 10px;
      font-size: 14px;
      font-weight: 600;
    }

    input[type="file"] {
      display: none;
    }

    .stats {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .blocks {
      display: grid;
      gap: 12px;
    }

    .block {
      position: relative;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .block.selected {
      background: var(--selected);
      border-color: #d4b100;
    }

    .block-head {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .block-content {
      white-space: pre-wrap;
      line-height: 1.55;
      word-break: break-word;
      user-select: text;
    }

    .toolbar,
    .tag-manager {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed rgba(0, 0, 0, 0.15);
      gap: 10px;
      flex-direction: column;
      align-items: stretch;
    }

    .block.selected .toolbar,
    .tag-manager.open {
      display: flex;
    }

    .toolbar .label,
    .tag-manager .label {
      color: var(--muted);
      font-size: 13px;
    }

    .tag-panel,
    .tag-manager-panel,
    .block-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tag-btn.active {
      background: var(--tag-active-bg);
      border-color: var(--tag-active-border);
    }

    .tag-add-row,
    .tag-manager-row,
    .edit-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .edit-panel {
      flex-direction: column;
      align-items: stretch;
    }

    .edit-head {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .tag-input,
    .tag-search-input {
      min-width: 160px;
      flex: 1;
    }

    .tag-create-toggle {
      min-width: 44px;
      text-align: center;
      font-weight: 600;
    }

    .tag-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 8px;
      background: #fff;
    }

    .tag-name {
      font-size: 14px;
    }

    .tag-delete {
      padding: 4px 8px;
      font-size: 12px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 12px;
    }

    .action-menu {
      position: fixed;
      z-index: 999;
      min-width: 140px;
      padding: 6px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--menu-shadow);
      display: none;
    }

    .action-menu.open {
      display: grid;
      gap: 6px;
    }

    .action-menu-item {
      width: 100%;
      text-align: left;
      border-radius: 10px;
      padding: 10px 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar panel">
      <div>
        <h1>Block Tag MVP</h1>
        <p class="hint">当前版本支持：打开 JSON、搜索、单击选中、双击正文编辑、多 tag 管理、新建 tag、自动缓存、恢复缓存、缓存页面位置、导出 JSON / 文本。</p>
      </div>

      <div class="row">
        <label class="file-label" for="fileInput">打开 JSON</label>
        <input id="fileInput" type="file" accept="application/json,.json" />

        <button id="exportJsonBtn" type="button">导出 JSON</button>
        <button id="exportTextBtn" type="button">导出文本</button>
        <button id="addBlockBtn" type="button">新增文本块</button>
        <button id="manageTagsBtn" type="button">管理 tag</button>
        <button id="clearCacheBtn" type="button">清除缓存</button>
      </div>

      <div class="row">
        <input id="searchInput" type="text" placeholder="搜索关键词或 tag" />
      </div>

      <div class="stats" id="stats"></div>

      <div class="tag-manager" id="tagManager">
        <div class="label">管理 tag</div>
        <div class="tag-manager-row">
          <input id="tagSearchInput" class="tag-search-input" type="text" placeholder="搜索 tag" />
        </div>
        <div class="tag-manager-row" id="tagManagerCreateRow">
          <button id="managerCreateToggleBtn" class="tag-create-toggle" type="button">＋</button>
        </div>
        <div class="tag-manager-panel" id="tagManagerPanel"></div>
      </div>
    </div>

    <div class="blocks" id="blocks"></div>
  </div>

  <div id="actionMenu" class="action-menu">
    <button id="addBeforeMenuItem" class="action-menu-item" type="button">在前新增</button>
    <button id="addAfterMenuItem" class="action-menu-item" type="button">在后新增</button>
    <button id="deleteMenuItem" class="action-menu-item" type="button">删除</button>
  </div>

  <script>
    const ALLOWED_KEYS = ["id", "original_content", "content", "tags", "source", "meta"];
    const CACHE_DATA_KEY = "block_tagger_data_v8";
    const CACHE_VIEW_KEY = "block_tagger_view_v8";
    const DEFAULT_TAGS = ["灵感"];

    const demoData = [
      {
        id: "1",
        original_content: "今天想到一个生态缸结构\n我要往里面放些端足目",
        content: "今天想到一个生态缸结构\n我要往里面放些端足目",
        tags: [],
        source: "manual",
        meta: {}
      },
      {
        id: "2",
        original_content: "filehelper: 这个思路可以扩展成系统设计",
        content: "filehelper: 这个思路可以扩展成系统设计",
        tags: ["灵感"],
        source: "wechat",
        meta: {}
      },
      {
        id: "3",
        original_content: "tag 不该直接写进正文，应该在导出层再拼接",
        content: "tag 不该直接写进正文，应该在导出层再拼接",
        tags: [],
        source: "note",
        meta: {}
      }
    ];

    const state = {
      blocks: [],
      selectedId: null,
      mainSelectedId: null,
      searchSelectedId: null,
      lastDataSavedAt: null,
      dataSaveTimer: null,
      viewSaveTimer: null,
      allTags: [],
      tagManagerOpen: false,
      inlineCreateOpenForBlockId: null,
      managerCreateOpen: false,
      lastSearchMode: false,
      normalScrollY: 0,
      searchScrollY: 0,
      editingBlockId: null,
      editingDraftContent: "",
      longPressTimer: null,
      longPressTriggeredBlockId: null,
      searchSession: {
        selectedId: null,
        scrollY: 0
      },
      actionMenu: {
        open: false,
        blockId: null,
        x: 0,
        y: 0
      }
    };

    const fileInput = document.getElementById("fileInput");
    const exportJsonBtn = document.getElementById("exportJsonBtn");
    const exportTextBtn = document.getElementById("exportTextBtn");
    const addBlockBtn = document.getElementById("addBlockBtn");
    const manageTagsBtn = document.getElementById("manageTagsBtn");
    const clearCacheBtn = document.getElementById("clearCacheBtn");
    const searchInput = document.getElementById("searchInput");
    const tagSearchInput = document.getElementById("tagSearchInput");
    const tagManager = document.getElementById("tagManager");
    const tagManagerPanel = document.getElementById("tagManagerPanel");
    const tagManagerCreateRow = document.getElementById("tagManagerCreateRow");
    const managerCreateToggleBtn = document.getElementById("managerCreateToggleBtn");
    const blocksEl = document.getElementById("blocks");
    const statsEl = document.getElementById("stats");
    const actionMenuEl = document.getElementById("actionMenu");
    const addBeforeMenuItem = document.getElementById("addBeforeMenuItem");
    const addAfterMenuItem = document.getElementById("addAfterMenuItem");
    const deleteMenuItem = document.getElementById("deleteMenuItem");

    function normalizeBlock(input, index) {
      const output = {};
      for (const key of ALLOWED_KEYS) {
        if (Object.prototype.hasOwnProperty.call(input, key)) {
          output[key] = input[key];
        }
      }

      if (typeof output.id !== "string" || !output.id.trim()) {
        output.id = String(index + 1);
      }

      if (typeof output.original_content !== "string") {
        output.original_content = typeof input.content === "string" ? input.content : "";
      }

      if (typeof output.content !== "string") {
        output.content = output.original_content;
      }

      if (!Array.isArray(output.tags)) {
        output.tags = [];
      }

      output.tags = output.tags
        .filter((tag) => typeof tag === "string")
        .map((tag) => tag.trim())
        .filter(Boolean);

      if (typeof output.source !== "string") {
        output.source = "unknown";
      }

      if (typeof output.meta !== "object" || output.meta === null || Array.isArray(output.meta)) {
        output.meta = {};
      }

      return output;
    }

    function deriveTagsFromBlocks(sourceBlocks) {
      const set = new Set();
      for (const block of sourceBlocks) {
        for (const tag of block.tags || []) {
          if (typeof tag === "string" && tag.trim()) {
            set.add(tag.trim());
          }
        }
      }
      return Array.from(set);
    }

    function ensureTagListNotEmpty() {
      if (state.allTags.length === 0) {
        state.allTags = [...DEFAULT_TAGS];
      }
    }

    function isSearchMode() {
      return searchInput.value.trim().length > 0;
    }

    function syncSelectionAfterChange(blockId) {
      state.selectedId = blockId;
      if (isSearchMode()) {
        state.searchSelectedId = blockId;
        state.searchSession.selectedId = blockId;
      } else {
        state.mainSelectedId = blockId;
      }
    }

    function clearSelectionState(blockId) {
      if (state.selectedId === blockId) state.selectedId = null;
      if (state.mainSelectedId === blockId) state.mainSelectedId = null;
      if (state.searchSelectedId === blockId) state.searchSelectedId = null;
      if (state.searchSession.selectedId === blockId) state.searchSession.selectedId = null;
    }

    function createNextBlockId() {
      let maxId = 0;
      for (const block of state.blocks) {
        const num = Number.parseInt(block.id, 10);
        if (!Number.isNaN(num)) {
          maxId = Math.max(maxId, num);
        }
      }
      return String(maxId + 1);
    }

    function createTextBlock(partial = {}) {
      return normalizeBlock(
        {
          id: createNextBlockId(),
          original_content: "",
          content: "",
          tags: [],
          source: "manual",
          meta: {},
          ...partial
        },
        state.blocks.length
      );
    }

    function loadBlocks(raw) {
      if (!Array.isArray(raw)) {
        throw new Error("JSON 顶层必须是数组。");
      }
      state.blocks = raw.map(normalizeBlock);
      state.selectedId = null;
      state.mainSelectedId = null;
      state.searchSelectedId = null;
      state.inlineCreateOpenForBlockId = null;
      state.editingBlockId = null;
      state.editingDraftContent = "";
      state.actionMenu.open = false;
      const importedTags = deriveTagsFromBlocks(state.blocks);
      state.allTags = importedTags.length > 0 ? importedTags : [...DEFAULT_TAGS];
      scheduleDataSave();
      scheduleViewSave();
      render();
    }

    function toggleTagForBlock(blockId, tagName) {
      const target = state.blocks.find((block) => block.id === blockId);
      if (!target) return;
      if (!Array.isArray(target.tags)) target.tags = [];

      if (target.tags.includes(tagName)) {
        target.tags = target.tags.filter((tag) => tag !== tagName);
      } else {
        target.tags.push(tagName);
      }

      scheduleDataSave();
      render();
    }

    function addNewTag(tagName) {
      const normalized = String(tagName || "").trim();
      if (!normalized) return false;
      if (!state.allTags.includes(normalized)) {
        state.allTags.push(normalized);
      }
      scheduleDataSave();
      render();
      return true;
    }

    function addBlock(afterBlockId = null) {
      const newBlock = createTextBlock();
      const index = afterBlockId ? state.blocks.findIndex((block) => block.id === afterBlockId) : -1;

      if (index >= 0) {
        state.blocks.splice(index + 1, 0, newBlock);
      } else {
        state.blocks.push(newBlock);
      }

      state.inlineCreateOpenForBlockId = null;
      state.editingBlockId = newBlock.id;
      state.editingDraftContent = newBlock.content || "";
      syncSelectionAfterChange(newBlock.id);
      scheduleDataSave();
      scheduleViewSave();
      render();
    }

    function addBlockBefore(beforeBlockId = null) {
      if (!beforeBlockId) {
        addBlock();
        return;
      }

      const newBlock = createTextBlock();
      const index = state.blocks.findIndex((block) => block.id === beforeBlockId);

      if (index >= 0) {
        state.blocks.splice(index, 0, newBlock);
      } else {
        state.blocks.push(newBlock);
      }

      state.inlineCreateOpenForBlockId = null;
      state.editingBlockId = newBlock.id;
      state.editingDraftContent = newBlock.content || "";
      syncSelectionAfterChange(newBlock.id);
      scheduleDataSave();
      scheduleViewSave();
      render();
    }

    function updateBlockContent(blockId, nextContent) {
      const target = state.blocks.find((block) => block.id === blockId);
      if (!target) return;
      target.content = String(nextContent || "");
      scheduleDataSave();
      renderStatsOnly();
    }

    function openEditor(blockId) {
      const target = state.blocks.find((block) => block.id === blockId);
      if (!target) return;
      state.editingBlockId = blockId;
      state.editingDraftContent = target.content || "";
      syncSelectionAfterChange(blockId);
      closeActionMenu();
      scheduleViewSave();
      render();
    }

    function closeEditor() {
      state.editingBlockId = null;
      state.editingDraftContent = "";
      scheduleViewSave();
      render();
    }

    function saveEditingBlock() {
      if (!state.editingBlockId) return;
      updateBlockContent(state.editingBlockId, state.editingDraftContent);
      closeEditor();
    }

    function deleteBlock(blockId) {
      const target = state.blocks.find((block) => block.id === blockId);
      if (!target) return;

      const preview = (target.content || "").trim().slice(0, 36);
      const confirmed = window.confirm(
        `确认删除这个 block 吗？\n\n${preview ? `内容预览：${preview}` : "这个 block 目前是空的。"}\n\n删除后会从当前工作数据中移除，但原始导入母本不受影响。`
      );
      if (!confirmed) return;

      state.blocks = state.blocks.filter((block) => block.id !== blockId);
      clearSelectionState(blockId);
      if (state.inlineCreateOpenForBlockId === blockId) state.inlineCreateOpenForBlockId = null;
      if (state.editingBlockId === blockId) {
        state.editingBlockId = null;
        state.editingDraftContent = "";
      }
      closeActionMenu();

      scheduleDataSave();
      scheduleViewSave();
      render();
    }

    function deleteTag(tagName) {
      if (!tagName) return;
      const confirmed = window.confirm(
        `确认删除 tag「${tagName}」吗？\n\n删除后，它会从 tag 列表中消失，并从所有 block 中一并移除。`
      );
      if (!confirmed) return;

      for (const block of state.blocks) {
        block.tags = block.tags.filter((tag) => tag !== tagName);
      }

      state.allTags = state.allTags.filter((tag) => tag !== tagName);
      ensureTagListNotEmpty();
      scheduleDataSave();
      render();
    }

    function autoResizeTextarea(textarea) {
      if (!textarea) return;
      textarea.style.height = "auto";
      const maxHeight = Math.floor(window.innerHeight * 0.5);
      const nextHeight = Math.min(textarea.scrollHeight, maxHeight);
      textarea.style.height = `${Math.max(nextHeight, 120)}px`;
    }

    function openActionMenu(blockId, x, y) {
      syncSelectionAfterChange(blockId);
      state.actionMenu.open = true;
      state.actionMenu.blockId = blockId;
      state.actionMenu.x = x;
      state.actionMenu.y = y;
      scheduleViewSave();
      render();
    }

    function closeActionMenu() {
      state.actionMenu.open = false;
      state.actionMenu.blockId = null;
    }

    function positionActionMenu() {
      if (!state.actionMenu.open) {
        actionMenuEl.classList.remove("open");
        return;
      }

      actionMenuEl.classList.add("open");
      actionMenuEl.style.left = "0px";
      actionMenuEl.style.top = "0px";

      requestAnimationFrame(() => {
        const menuWidth = actionMenuEl.offsetWidth;
        const menuHeight = actionMenuEl.offsetHeight;
        const maxLeft = Math.max(window.innerWidth - menuWidth - 8, 8);
        const maxTop = Math.max(window.innerHeight - menuHeight - 8, 8);
        const left = Math.min(Math.max(state.actionMenu.x, 8), maxLeft);
        const top = Math.min(Math.max(state.actionMenu.y, 8), maxTop);
        actionMenuEl.style.left = `${left}px`;
        actionMenuEl.style.top = `${top}px`;
      });
    }

    function startActionMenuLongPress(blockId, event) {
      window.clearTimeout(state.longPressTimer);
      state.longPressTriggeredBlockId = null;
      const x = event.clientX || 16;
      const y = event.clientY || 16;
      state.longPressTimer = window.setTimeout(() => {
        state.longPressTriggeredBlockId = blockId;
        openActionMenu(blockId, x + 8, y + 8);
      }, 650);
    }

    function cancelActionMenuLongPress() {
      window.clearTimeout(state.longPressTimer);
      state.longPressTimer = null;
    }

    function updateScrollBucketFromCurrentState() {
      if (isSearchMode()) {
        state.searchScrollY = window.scrollY;
        state.searchSession.scrollY = state.searchScrollY;
      } else {
        state.normalScrollY = window.scrollY;
      }
    }

    function scrollToSelectedOrFallback() {
      if (state.selectedId) {
        const el = document.querySelector(`.block[data-id="${state.selectedId}"]`);
        if (el) {
          el.scrollIntoView({ block: "center", behavior: "auto" });
          return;
        }
      }

      const targetScrollY = isSearchMode() ? state.searchScrollY : state.normalScrollY;
      window.scrollTo({ top: targetScrollY, behavior: "auto" });
    }

    function handleSearchModeTransition() {
      const currentSearchMode = isSearchMode();
      if (currentSearchMode === state.lastSearchMode) return;

      updateScrollBucketFromCurrentState();

      if (currentSearchMode) {
        state.searchSelectedId = state.searchSession.selectedId;
        state.searchScrollY = state.searchSession.scrollY || 0;
        state.selectedId = state.searchSelectedId ?? state.mainSelectedId;
      } else {
        state.selectedId = state.mainSelectedId;
      }

      state.lastSearchMode = currentSearchMode;

      requestAnimationFrame(() => {
        scrollToSelectedOrFallback();
        updateScrollBucketFromCurrentState();
        scheduleViewSave();
      });
    }

    function saveDataCache() {
      try {
        const payload = {
          blocks: state.blocks,
          allTags: state.allTags,
          lastDataSavedAt: new Date().toISOString()
        };

        localStorage.setItem(CACHE_DATA_KEY, JSON.stringify(payload));
        state.lastDataSavedAt = payload.lastDataSavedAt;
        renderStatsOnly();
      } catch (error) {
        console.error("保存数据缓存失败", error);
      }
    }

    function scheduleDataSave() {
      window.clearTimeout(state.dataSaveTimer);
      state.dataSaveTimer = window.setTimeout(saveDataCache, 300);
    }

    function loadDataCache() {
      try {
        const raw = localStorage.getItem(CACHE_DATA_KEY);
        if (!raw) return false;

        const payload = JSON.parse(raw);
        if (!payload || !Array.isArray(payload.blocks)) return false;

        state.blocks = payload.blocks.map(normalizeBlock);
        state.allTags = Array.isArray(payload.allTags)
          ? payload.allTags.filter((tag) => typeof tag === "string" && tag.trim()).map((tag) => tag.trim())
          : deriveTagsFromBlocks(state.blocks);
        ensureTagListNotEmpty();
        state.lastDataSavedAt = typeof payload.lastDataSavedAt === "string" ? payload.lastDataSavedAt : null;
        return true;
      } catch (error) {
        console.error("读取数据缓存失败", error);
        return false;
      }
    }

    function saveViewState() {
      try {
        const payload = {
          selectedId: state.selectedId,
          mainSelectedId: state.mainSelectedId,
          searchSelectedId: state.searchSelectedId,
          searchText: searchInput.value,
          tagSearchText: tagSearchInput.value,
          normalScrollY: state.normalScrollY,
          searchScrollY: state.searchScrollY,
          inlineCreateOpenForBlockId: state.inlineCreateOpenForBlockId,
          editingBlockId: state.editingBlockId,
          editingDraftContent: state.editingDraftContent,
          searchSession: state.searchSession
        };
        localStorage.setItem(CACHE_VIEW_KEY, JSON.stringify(payload));
      } catch (error) {
        console.error("保存界面缓存失败", error);
      }
    }

    function scheduleViewSave() {
      window.clearTimeout(state.viewSaveTimer);
      state.viewSaveTimer = window.setTimeout(saveViewState, 200);
    }

    function loadViewState() {
      try {
        const raw = localStorage.getItem(CACHE_VIEW_KEY);
        if (!raw) return;
        const payload = JSON.parse(raw);

        state.selectedId = typeof payload.selectedId === "string" ? payload.selectedId : null;
        state.mainSelectedId = typeof payload.mainSelectedId === "string" ? payload.mainSelectedId : null;
        state.searchSelectedId = typeof payload.searchSelectedId === "string" ? payload.searchSelectedId : null;
        state.searchSession = payload.searchSession || { selectedId: null, scrollY: 0 };
        searchInput.value = typeof payload.searchText === "string" ? payload.searchText : "";
        tagSearchInput.value = typeof payload.tagSearchText === "string" ? payload.tagSearchText : "";
        state.normalScrollY = typeof payload.normalScrollY === "number" ? payload.normalScrollY : 0;
        state.searchScrollY = typeof payload.searchScrollY === "number" ? payload.searchScrollY : 0;
        state.inlineCreateOpenForBlockId = typeof payload.inlineCreateOpenForBlockId === "string" ? payload.inlineCreateOpenForBlockId : null;
        state.editingBlockId = typeof payload.editingBlockId === "string" ? payload.editingBlockId : null;
        state.editingDraftContent = typeof payload.editingDraftContent === "string" ? payload.editingDraftContent : "";

        requestAnimationFrame(() => {
          scrollToSelectedOrFallback();
        });
      } catch (error) {
        console.error("读取界面缓存失败", error);
      }
    }

    function clearCache() {
      const confirmed = window.confirm(
        "确认清除本地缓存吗？\n\n清除后，本地自动保存的工作状态会消失。\n已导出的 JSON 文件不受影响。\n未导出的修改可能无法恢复。"
      );

      if (!confirmed) return;

      localStorage.removeItem(CACHE_DATA_KEY);
      localStorage.removeItem(CACHE_VIEW_KEY);
      state.lastDataSavedAt = null;
      state.allTags = [...DEFAULT_TAGS];
      state.selectedId = null;
      state.mainSelectedId = null;
      state.searchSelectedId = null;
      state.inlineCreateOpenForBlockId = null;
      state.editingBlockId = null;
      state.editingDraftContent = "";
      state.lastSearchMode = false;
      state.normalScrollY = 0;
      state.searchScrollY = 0;
      state.searchSession = { selectedId: null, scrollY: 0 };
      closeActionMenu();
      loadBlocks(demoData);
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    function getFilteredBlocks() {
      const keyword = searchInput.value.trim().toLowerCase();
      if (!keyword) return state.blocks;

      return state.blocks.filter((block) => {
        const text = (block.content || "").toLowerCase();
        const tags = (block.tags || []).join(" ").toLowerCase();
        const source = (block.source || "").toLowerCase();
        return text.includes(keyword) || tags.includes(keyword) || source.includes(keyword);
      });
    }

    function getFilteredTagList() {
      const keyword = tagSearchInput.value.trim().toLowerCase();
      if (!keyword) return state.allTags;
      return state.allTags.filter((tag) => tag.toLowerCase().includes(keyword));
    }

    function formatTime(isoString) {
      if (!isoString) return "尚未保存数据";
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return "尚未保存数据";
      return date.toLocaleString();
    }

    function renderStatsOnly() {
      const filtered = getFilteredBlocks();
      statsEl.textContent = `当前 ${state.blocks.length} 个块，显示 ${filtered.length} 个。tag 数量：${state.allTags.length}。数据上次自动保存：${formatTime(state.lastDataSavedAt)}。`;
    }

    function buildInlineCreateRow() {
      const row = document.createElement("div");
      row.className = "tag-add-row";
      row.addEventListener("click", (event) => {
        event.stopPropagation();
      });
      row.addEventListener("pointerdown", (event) => {
        event.stopPropagation();
      });

      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "新建 tag";
      input.className = "tag-input";
      input.addEventListener("click", (event) => {
        event.stopPropagation();
      });
      input.addEventListener("pointerdown", (event) => {
        event.stopPropagation();
      });

      const addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.textContent = "确认新建";
      addBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        const ok = addNewTag(input.value);
        if (ok) {
          state.inlineCreateOpenForBlockId = null;
          scheduleViewSave();
          render();
        }
      });
      addBtn.addEventListener("pointerdown", (event) => {
        event.stopPropagation();
      });

      input.addEventListener("keydown", (event) => {
        event.stopPropagation();
        if (event.key === "Enter") {
          event.preventDefault();
          const ok = addNewTag(input.value);
          if (ok) {
            state.inlineCreateOpenForBlockId = null;
            scheduleViewSave();
            render();
          }
        }
      });

      row.append(input, addBtn);
      return row;
    }

    function renderTagManager() {
      tagManager.classList.toggle("open", state.tagManagerOpen);
      tagManagerPanel.innerHTML = "";
      tagManagerCreateRow.querySelectorAll("input, .tag-input-confirm").forEach((node) => node.remove());

      if (!state.tagManagerOpen) return;

      const tags = getFilteredTagList();

      if (state.managerCreateOpen) {
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "新建 tag";
        input.className = "tag-input";

        const confirmBtn = document.createElement("button");
        confirmBtn.type = "button";
        confirmBtn.className = "tag-input-confirm";
        confirmBtn.textContent = "确认新建";

        const submit = () => {
          const ok = addNewTag(input.value);
          if (ok) {
            state.managerCreateOpen = false;
            scheduleViewSave();
            render();
          }
        };

        confirmBtn.addEventListener("click", submit);
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            submit();
          }
        });

        tagManagerCreateRow.append(input, confirmBtn);
      }

      for (const tag of tags) {
        const item = document.createElement("div");
        item.className = "tag-item";

        const name = document.createElement("span");
        name.className = "tag-name";
        name.textContent = tag;

        const del = document.createElement("button");
        del.type = "button";
        del.className = "tag-delete";
        del.textContent = "删除";
        del.addEventListener("click", (event) => {
          event.stopPropagation();
          deleteTag(tag);
        });

        item.append(name, del);
        tagManagerPanel.appendChild(item);
      }
    }

    function render() {
      const filtered = getFilteredBlocks();
      blocksEl.innerHTML = "";
      renderStatsOnly();
      renderTagManager();

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "panel empty";
        empty.textContent = "没有匹配的块。";
        blocksEl.appendChild(empty);
        positionActionMenu();
        return;
      }

      for (const block of filtered) {
        const item = document.createElement("div");
        item.className = "block" + (block.id === state.selectedId ? " selected" : "");
        item.dataset.id = block.id;

        const head = document.createElement("div");
        head.className = "block-head";
        const tagText = Array.isArray(block.tags) && block.tags.length ? block.tags.join(", ") : "";
        head.textContent = `[${tagText}] id=${block.id} source=${block.source}`;

        const content = document.createElement("div");
        content.className = "block-content";
        content.textContent = block.content;
        content.addEventListener("dblclick", (event) => {
          event.stopPropagation();
          event.preventDefault();
          openEditor(block.id);
        });

        const toolbar = document.createElement("div");
        toolbar.className = "toolbar";
        toolbar.addEventListener("click", (event) => {
          event.stopPropagation();
        });
        toolbar.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
        });

        const label = document.createElement("span");
        label.className = "label";
        label.textContent = "电脑端右键 block 打开操作；手机端长按 block 打开操作。";

        const tagPanel = document.createElement("div");
        tagPanel.className = "tag-panel";
        tagPanel.addEventListener("click", (event) => {
          event.stopPropagation();
        });
        tagPanel.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
        });

        for (const tag of state.allTags) {
          const tagBtn = document.createElement("button");
          tagBtn.type = "button";
          tagBtn.className = "tag-btn" + (block.tags.includes(tag) ? " active" : "");
          tagBtn.textContent = tag;
          tagBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            toggleTagForBlock(block.id, tag);
          });
          tagBtn.addEventListener("pointerdown", (event) => {
            event.stopPropagation();
          });
          tagPanel.appendChild(tagBtn);
        }

        const createToggleBtn = document.createElement("button");
        createToggleBtn.type = "button";
        createToggleBtn.className = "tag-create-toggle";
        createToggleBtn.textContent = "＋";
        createToggleBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          state.inlineCreateOpenForBlockId = state.inlineCreateOpenForBlockId === block.id ? null : block.id;
          scheduleViewSave();
          render();
        });
        createToggleBtn.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
        });
        tagPanel.appendChild(createToggleBtn);

        toolbar.append(label, tagPanel);

        if (state.inlineCreateOpenForBlockId === block.id) {
          toolbar.appendChild(buildInlineCreateRow());
        }

        if (state.editingBlockId === block.id) {
          const editPanel = document.createElement("div");
          editPanel.className = "edit-panel";
          editPanel.addEventListener("click", (event) => {
            event.stopPropagation();
          });
          editPanel.addEventListener("pointerdown", (event) => {
            event.stopPropagation();
          });

          const editHead = document.createElement("div");
          editHead.className = "edit-head";

          const saveBtn = document.createElement("button");
          saveBtn.type = "button";
          saveBtn.className = "save-btn";
          saveBtn.textContent = "保存";
          saveBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            saveEditingBlock();
          });
          saveBtn.addEventListener("pointerdown", (event) => {
            event.stopPropagation();
          });
          editHead.appendChild(saveBtn);

          const textarea = document.createElement("textarea");
          textarea.value = state.editingDraftContent;
          textarea.placeholder = "输入这个文本块的内容";
          textarea.addEventListener("click", (event) => {
            event.stopPropagation();
          });
          textarea.addEventListener("pointerdown", (event) => {
            event.stopPropagation();
          });
          textarea.addEventListener("input", () => {
            state.editingDraftContent = textarea.value;
            scheduleViewSave();
            autoResizeTextarea(textarea);
          });
          textarea.addEventListener("keydown", (event) => {
            event.stopPropagation();
          });
          requestAnimationFrame(() => {
            autoResizeTextarea(textarea);
          });

          const editHint = document.createElement("div");
          editHint.className = "label";
          editHint.textContent = "先单击选中，再双击正文编辑；输入时会自动长高，点右上角保存后才写入当前 block。";

          editPanel.append(editHead, textarea, editHint);
          toolbar.appendChild(editPanel);
        }

        item.append(head, content, toolbar);

        item.addEventListener("click", (event) => {
          if (event.detail > 1) return;
          if (state.longPressTriggeredBlockId === block.id) {
            state.longPressTriggeredBlockId = null;
            return;
          }

          closeActionMenu();

          if (state.selectedId === block.id) {
            clearSelectionState(block.id);
            state.inlineCreateOpenForBlockId = null;
            if (state.editingBlockId === block.id) {
              state.editingBlockId = null;
              state.editingDraftContent = "";
            }
          } else {
            syncSelectionAfterChange(block.id);
          }

          scheduleViewSave();
          render();
        });

        item.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          event.stopPropagation();
          openActionMenu(block.id, event.clientX + 8, event.clientY + 8);
        });

        item.addEventListener("pointerdown", (event) => {
          if (event.pointerType !== "touch") return;
          if (event.target.closest(".toolbar")) return;
          if (event.target.closest("textarea, input, button")) return;
          startActionMenuLongPress(block.id, event);
        });

        item.addEventListener("pointerup", () => {
          cancelActionMenuLongPress();
        });
        item.addEventListener("pointerleave", () => {
          cancelActionMenuLongPress();
        });
        item.addEventListener("pointercancel", () => {
          cancelActionMenuLongPress();
        });

        blocksEl.appendChild(item);
      }

      positionActionMenu();

      requestAnimationFrame(() => {
        scrollToSelectedOrFallback();
      });
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportJson() {
      downloadFile(
        "blocks_tagged.json",
        JSON.stringify(state.blocks, null, 2),
        "application/json;charset=utf-8"
      );
    }

    function exportText() {
      const text = state.blocks
        .map((block) => {
          const tagText = Array.isArray(block.tags) && block.tags.length ? block.tags.join(", ") : "";
          return `[${tagText}]${block.content}`;
        })
        .join("\n\n--------------------\n\n");

      downloadFile("blocks_tagged.txt", text, "text/plain;charset=utf-8");
    }

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        loadBlocks(parsed);
      } catch (error) {
        alert("打开 JSON 失败：\n" + error.message);
      }
    });

    exportJsonBtn.addEventListener("click", exportJson);
    exportTextBtn.addEventListener("click", exportText);
    addBlockBtn.addEventListener("click", () => {
      addBlock(state.selectedId);
    });
    clearCacheBtn.addEventListener("click", clearCache);

    manageTagsBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      state.tagManagerOpen = !state.tagManagerOpen;
      scheduleViewSave();
      render();
    });

    managerCreateToggleBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      state.managerCreateOpen = !state.managerCreateOpen;
      scheduleViewSave();
      render();
    });

    searchInput.addEventListener("input", () => {
      handleSearchModeTransition();
      scheduleViewSave();
      render();
    });

    deleteMenuItem.addEventListener("click", (event) => {
      event.stopPropagation();
      const blockId = state.actionMenu.blockId;
      closeActionMenu();
      if (blockId) {
        deleteBlock(blockId);
      }
    });

    addAfterMenuItem.addEventListener("click", (event) => {
      event.stopPropagation();
      const blockId = state.actionMenu.blockId;
      closeActionMenu();
      if (blockId) {
        addBlock(blockId);
      } else {
        addBlock();
      }
    });

    addBeforeMenuItem.addEventListener("click", (event) => {
      event.stopPropagation();
      const blockId = state.actionMenu.blockId;
      closeActionMenu();
      if (blockId) {
        addBlockBefore(blockId);
      } else {
        addBlockBefore();
      }
    });

    document.addEventListener("click", (event) => {
      if (actionMenuEl.contains(event.target)) return;
      closeActionMenu();
      positionActionMenu();
    });

    window.addEventListener("resize", () => {
      positionActionMenu();
    });

    const restoredData = loadDataCache();
    if (!restoredData) {
      state.blocks = demoData.map(normalizeBlock);
      state.allTags = [...DEFAULT_TAGS];
    }
    loadViewState();
    state.lastSearchMode = isSearchMode();
    render();
  </script>
</body>
</html>
